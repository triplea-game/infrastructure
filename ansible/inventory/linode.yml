# Dynamic inventory plugin for Linode.
# Requires the community.general.linode plugin (see requirements.yml).
# Requires LINODE_TOKEN environment variable before running Ansible.

plugin: community.general.linode
access_token: "{{ lookup('env', 'LINODE_TOKEN') }}"

# Servers need to have any of these tags to be included in the inventory
tags:
  - Bot
  - bots
  - forums
  - marti
  - lobby

# compose exposes variables to ansible from dynamic values
compose:
  ansible_host: ipv4[0]
  hostname: label
  # Extract metadata from tags set by Terraform (servers.tf): keep the matching tag, strip its prefix.
  # Hosts without the tag resolve to 0 / '' respectively.
  bot_number: "tags | select('match', '^botnum-') | map('regex_replace', '^botnum-', '') | first | default(0) | int"
  bot_location: "tags | select('match', '^botlocation-') | map('regex_replace', '^botlocation-', '') | first | default('')"

# keyed_groups creates an Ansible host group for each Linode tag.
# EG: a server tagged "Bot" becomes a member of the inventory group "Bot".
keyed_groups:
  - key: tags
    separator: ""
