# Reverse-proxy for the support server. Unlike /lobby (a container on this same
# box), support runs on its own Linode; we reach it over the private
# network via the 'support_backend' upstream in pre-server-support.conf.
location ^~ /support {
      proxy_pass              http://support_backend;
      # HTTP/1.1 + empty Connection header are required for upstream keepalive.
      proxy_http_version      1.1;
      proxy_set_header        Connection "";
      proxy_set_header        Host $host;
      proxy_set_header        X-Real-IP $remote_addr;
      proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Proto $scheme;
      proxy_read_timeout  90;
    }
