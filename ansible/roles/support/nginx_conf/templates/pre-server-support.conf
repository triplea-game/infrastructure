# Upstream for the support server. It runs on its own Linode in the same
# datacenter, so unlike the local lobby container we reach it over the private
# network (the 'private_ip' set in the Linode dynamic inventory). keepalive
# holds a pool of warm connections so the cross-box hop avoids a fresh TCP
# handshake on every request.
#
# NOTE: this requires the support container to publish its port on the
# private IP (not 127.0.0.1) and the firewall to allow this host -> support:{{ support_http_port }}.
upstream support_backend {
    server {{ hostvars[groups['support'][0]].private_ip }}:{{ support_http_port }};
    keepalive 16;
}
