- name: create support db backup directory
  become: true
  file:
    state: directory
    path: "{{ support_db_backup_directory }}"
    owner: support
    group: support
    mode: "0750"

- name: deploy support db backup script
  become: true
  template:
    src: backup-support-db.sh.j2
    dest: "{{ support_working_directory }}/backup-support-db.sh"
    owner: root
    group: root
    mode: "0755"

- name: schedule daily support db backup cron job
  become: true
  cron:
    name: triplea-support-db-backup
    user: root
    hour: "7"
    minute: "0"
    job: "{{ support_working_directory }}/backup-support-db.sh >> /var/log/triplea-support-db-backup.log 2>&1"
