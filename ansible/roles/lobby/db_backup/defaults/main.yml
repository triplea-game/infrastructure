# Directory the lobby docker-compose project lives in (matches lobby/service role).
lobby_working_directory: /opt/lobby

# Where the daily database backup is written. The same file is overwritten
# on each run, so only the most recent day's backup is kept.
lobby_db_backup_directory: "{{ lobby_working_directory }}/backups"
lobby_db_backup_file: lobby_db.sql.gz
