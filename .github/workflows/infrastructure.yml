name: Infrastructure

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:  # manual run on any branch — treated as apply if on master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: Terraform ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master' && 'apply' || 'plan' }}
    runs-on: ubuntu-latest
    env:
      TF_VAR_linode_token: ${{ secrets.LINODE_TOKEN }}
    defaults:
      run:
        working-directory: terraform/
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: make init

      - name: Terraform Validate
        run: make validate

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: make plan

      - name: Terraform Apply
        if: >
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
          && github.ref == 'refs/heads/master'
        run: make apply-now

  ansible:
    name: Ansible ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master' && 'apply' || 'diff' }}
    runs-on: ubuntu-latest
    needs: terraform
    env:
      TRIPLEA_ANSIBLE_VAULT_PASSWORD: ${{ secrets.TRIPLEA_ANSIBLE_VAULT_PASSWORD }}
      LINODE_ACCESS_TOKEN: ${{ secrets.LINODE_ACCESS_TOKEN }}
    defaults:
      run:
        working-directory: ansible/
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_INFRASTRUCTURE_USER_PRIVATE_SSH_KEY }}

      - name: Install Ansible + galaxy deps
        run: |
          sudo apt-add-repository --yes --update ppa:ansible/ansible
          sudo apt-get install -y ansible
          ansible-galaxy collection install -r requirements.yml --force

      - name: Ansible Diff (PR preview)
        if: github.event_name == 'pull_request'
        run: SSH_USER=deploy-infrastructure make diff

      - name: Ansible Apply
        if: >
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
          && github.ref == 'refs/heads/master'
        run: SSH_USER=deploy-infrastructure make apply

