name: Infrastructure

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:  # manual run on any branch — treated as apply if on main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: Terraform ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && 'apply' || 'plan' }}
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      TF_VAR_linode_token: ${{ secrets.LINODE_TOKEN }}
      TF_TOKEN_app_terraform_io: ${{  secrets.TF_TOKEN_APP_TERRAFORM_IO }}
    defaults:
      run:
        working-directory: terraform/
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: make init

      - name: Terraform Validate
        run: make validate

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: make plan

      - name: Terraform Apply
        if: >
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
          && github.ref == 'refs/heads/main'
        run: make apply-now

  ansible:
    name: Ansible ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && 'apply' || 'diff' }}
    runs-on: ubuntu-latest
    needs: terraform
    env:
      TRIPLEA_ANSIBLE_VAULT_PASSWORD: ${{ secrets.TRIPLEA_ANSIBLE_VAULT_PASSWORD }}
      LINODE_ACCESS_TOKEN: ${{ secrets.LINODE_TOKEN }}
    defaults:
      run:
        working-directory: ansible/
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.INFRASTRUCTURE_SSH_PRIVATE_KEY }}

      - uses: astral-sh/setup-uv@v5

      - name: Install Ansible + galaxy deps
        run: |
          make install-ansible
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Ansible Diff (PR preview)
        if: github.event_name == 'pull_request'
        run: SSH_USER=ansible make diff

      - name: Ansible Apply
        if: >
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
          && github.ref == 'refs/heads/main'
        run: SSH_USER=ansible make apply
